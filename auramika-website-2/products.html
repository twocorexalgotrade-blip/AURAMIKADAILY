<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apothecary — Auramika</title>
  <meta name="description" content="The full Auramika apothecary — every piece from every drawer." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Allura&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/variables.css" />
  <link rel="stylesheet" href="styles/pages/auramika-landing.css" />
  <link rel="stylesheet" href="styles/pages/auramika-mirror.css" />
  <link rel="stylesheet" href="styles/pages/auramika-pages.css" />
</head>
<body class="auramika-body" data-page="products">

  <main class="au-page">
    <header class="au-page-head">
      <div class="au-page-head__crumbs"><a href="index.html">House</a><span>·</span><a href="index.html#cabinet">Apothecary</a></div>
      <div class="au-page-head__row">
        <div>
          <h1>The <em>Apothecary</em></h1>
          <p>Every drawer in the house, on one shelf. Filter by category, sort by what your aura quietly suggests.</p>
        </div>
      </div>
    </header>

    <div class="au-filter">
      <button class="au-chip is-active" data-filter="all">All</button>
      <button class="au-chip" data-filter="rings">Rings</button>
      <button class="au-chip" data-filter="necklaces">Necklaces</button>
      <button class="au-chip" data-filter="earrings">Earrings</button>
      <button class="au-chip" data-filter="anklets">Anklets &amp; Belts</button>
      <button class="au-chip" data-filter="tikkas">Maang Tikkas</button>
      <div class="au-filter__sort">
        Sort
        <select>
          <option>Most Loved</option>
          <option>New Arrivals</option>
          <option>Price · Low to High</option>
          <option>Price · High to Low</option>
          <option>By Aura Match</option>
        </select>
      </div>
    </div>

    <div class="au-grid" id="auGrid"></div>
  </main>

  <script src="js/au-shell.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      const PIECES = [
        ['rings','Aanya','Solitaire · 22k','assets/images/gold_ring.jpg',184000,'New','22k · 5.2g'],
        ['rings','Vidya','Band · 18k','assets/images/Pendant1.jpg',64200,'','18k · 3.8g'],
        ['rings','Meera','Stack · 22k','assets/images/Pendant1.2.jpg',98500,'','22k · 6.4g'],
        ['rings','Saanvi','Platinum · VVS1','assets/images/Pendant1.3.jpg',210000,'Limited','Pt950 · 4.6g'],
        ['necklaces','Devika','Polki Set','assets/images/Pendant1.4.jpg',284000,'Bridal','22k · 14.2g'],
        ['necklaces','Anvitha','Temple','assets/images/Pendant1.5.jpg',178500,'','22k · 9.8g'],
        ['necklaces','Riya','Solitaire','assets/images/Pendant1.1.jpg',86000,'Bestseller','18k · 6.4g'],
        ['necklaces','Ila','Mathapatti','assets/images/Maang Tikka1.jpg',146000,'','22k · 11.6g'],
        ['earrings','Tara','Drop · 22k','assets/images/earring1.jpg',42000,'New','22k · 4.2g'],
        ['earrings','Saanvi','Jhumka','assets/images/Maang Tikka1.1.jpg',118000,'','22k · 7.6g'],
        ['earrings','Mira','Stud · 18k','assets/images/gold Nose Pin1.jpg',38500,'','18k · 2.4g'],
        ['earrings','Aanvi','Hoop','assets/images/gold Nose Pin1.1.jpg',74000,'','22k · 5.8g'],
        ['anklets','Tara','Payal · 22k','assets/images/Starry Elegance Gold Anklet1.jpg',142000,'','22k · 16.4g'],
        ['anklets','Saanvi','Heirloom','assets/images/Starry Elegance Gold Anklet1.1.jpg',186000,'Limited','22k · 18.2g'],
        ['anklets','Lakshmi','Kandora','assets/images/Lakshmi Waist Belt1.jpg',312000,'Bridal','22k · 24.8g'],
        ['tikkas','Mira','Maang Tikka','assets/images/Pattern Maang Tikka1.jpg',98500,'','22k · 11.4g'],
      ];

      const grid = document.getElementById('auGrid');
      function render(filter) {
        grid.innerHTML = '';
        PIECES.filter(p => filter === 'all' || p[0] === filter).forEach((p, i) => {
          const [cat, name, meta, img, price, tag, karat] = p;
          const card = document.createElement('a');
          card.href = `product-detail.html?id=${cat}-${i}&name=${encodeURIComponent(name)}&price=${price}&img=${encodeURIComponent(img)}&karat=${encodeURIComponent(karat)}&meta=${encodeURIComponent(meta)}`;
          card.className = 'au-prod has-loupe';
          card.dataset.cursor = 'View';
          card.dataset.karat = karat;
          card.innerHTML = `
            <div class="au-prod__media">
              ${tag ? `<span class="au-prod__tag${tag === 'New' || tag === 'Limited' ? ' --gold' : ''}">${tag}</span>` : ''}
              <button class="au-prod__heart" data-cursor="Save" aria-label="Save">♡</button>
              <img src="${img}" alt="${name}" loading="lazy" />
            </div>
            <div class="au-prod__body">
              <div class="au-prod__meta">${meta}</div>
              <h3 class="au-prod__name">${name}</h3>
              <div class="au-prod__row">
                <span class="au-prod__price">₹${price.toLocaleString('en-IN')}</span>
                <button class="au-prod__add" data-cursor="Add" data-name="${name}" data-price="${price}" data-img="${img}" data-meta="${meta}" data-karat="${karat}">+</button>
              </div>
            </div>`;
          grid.appendChild(card);
        });
        bindCardEvents();
      }

      function bindCardEvents() {
        document.querySelectorAll('.au-prod__heart').forEach(b => {
          b.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            b.classList.toggle('is-active');
            window.AURA?.toast(b.classList.contains('is-active') ? 'Saved to wishlist' : 'Removed');
          });
        });
        document.querySelectorAll('.au-prod__add').forEach(b => {
          b.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            window.AURA?.addToCart({
              name: b.dataset.name, price: parseInt(b.dataset.price, 10),
              img: b.dataset.img, meta: b.dataset.meta, karat: b.dataset.karat,
            });
            const img = b.closest('.au-prod').querySelector('img');
            window.AURA?.flyTo(img, document.getElementById('auKarat'));
          });
        });
      }

      document.querySelectorAll('.au-filter .au-chip').forEach(b => {
        b.addEventListener('click', () => {
          document.querySelectorAll('.au-filter .au-chip').forEach(x => x.classList.remove('is-active'));
          b.classList.add('is-active');
          render(b.dataset.filter);
        });
      });

      const cat = new URLSearchParams(location.search).get('cat');
      if (cat) {
        const chip = document.querySelector(`.au-filter .au-chip[data-filter="${cat}"]`);
        if (chip) chip.click();
        else render('all');
      } else {
        render('all');
      }
    });
  </script>
</body>
</html>
