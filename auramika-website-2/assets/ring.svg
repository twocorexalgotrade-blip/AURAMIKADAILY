<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ring Band (Gold) -->
  <defs>
    <linearGradient id="goldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDB931" />
      <stop offset="25%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FDB931" />
      <stop offset="75%" stop-color="#BF953F" />
      <stop offset="100%" stop-color="#FDB931" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main Band Circle -->
  <circle cx="256" cy="256" r="180" stroke="url(#goldGradient)" stroke-width="40" fill="none" filter="url(#glow)"/>
  
  <!-- Inner Shadow for depth -->
  <circle cx="256" cy="256" r="180" stroke="rgba(0,0,0,0.2)" stroke-width="5" fill="none" />
  
  <!-- Diamond Setting (prongs) -->
  <path d="M226 80 L236 50 L276 50 L286 80" stroke="#E5E4E2" stroke-width="4" fill="none"/>
  
  <!-- Diamond (Top View) -->
  <g transform="translate(256, 50)">
    <circle cx="0" cy="0" r="35" fill="rgba(255, 255, 255, 0.9)" stroke="#E0FFFF" stroke-width="1"/>
    <!-- Facets -->
    <path d="M-35 0 L0 -35 L35 0 L0 35 Z" fill="rgba(200, 240, 255, 0.4)" />
    <path d="M-20 -20 L20 20 M-20 20 L20 -20" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="rgba(255, 255, 255, 0.6)" />
  </g>
</svg>
