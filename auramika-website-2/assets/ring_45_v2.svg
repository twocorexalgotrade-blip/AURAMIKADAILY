<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold Gradient for Band (Metallic) -->
    <linearGradient id="gold-band" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6C229" />
      <stop offset="20%" stop-color="#F1DCA7" />
      <stop offset="40%" stop-color="#D4AF37" />
      <stop offset="60%" stop-color="#B58900" />
      <stop offset="80%" stop-color="#F1DCA7" />
      <stop offset="100%" stop-color="#E6C229" />
    </linearGradient>
    
    <!-- Stone Facets -->
    <linearGradient id="diamond-sparkle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#E0F7FA" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <!-- Drop Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur"/>
      <feOffset in="blur" dx="5" dy="20" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ring Band (Perspective Ellipse) -->
  <g filter="url(#shadow)">
    <!-- Back part of band (darker) -->
    <path d="M100 280 C100 180, 412 180, 412 280 L412 290 C412 190, 100 190, 100 290 Z" fill="#B58900"/>
    
    <!-- Front/Main Band -->
    <ellipse cx="256" cy="280" rx="160" ry="100" stroke="url(#gold-band)" stroke-width="28" fill="none" />
    
    <!-- Inner Band Highlight -->
    <ellipse cx="256" cy="280" rx="160" ry="100" stroke="rgba(255,255,255,0.4)" stroke-width="4" fill="none" transform="scale(0.96)"/>
  </g>

  <!-- Diamond Setting (Prongs) -->
  <g transform="translate(256, 175)">
     <path d="M-25 15 L-30 40 L-10 15 Z" fill="#D4AF37" />
     <path d="M25 15 L30 40 L10 15 Z" fill="#D4AF37" />
     <path d="M-15 10 L-20 35 L0 10 Z" fill="#F1DCA7" />
     <path d="M15 10 L20 35 L0 10 Z" fill="#F1DCA7" />
  </g>

  <!-- Diamond (Brilliant Cut - Top/Angled) -->
  <g transform="translate(256, 140) scale(1.2)">
    <!-- Pavilion (Bottom) -->
    <path d="M-30 0 L0 35 L30 0 Z" fill="rgba(200,245,255,0.5)" />
    
    <!-- Crown (Top Facets) -->
    <path d="M-30 0 L-15 -15 L15 -15 L30 0 L0 10 Z" fill="url(#diamond-sparkle)" opacity="0.9"/>
    <path d="M-30 0 L-15 -15 L0 10 Z" fill="#E0F7FA" opacity="0.8"/>
    <path d="M30 0 L15 -15 L0 10 Z" fill="#E0F7FA" opacity="0.8"/>
    <path d="M-15 -15 L0 -25 L15 -15 L0 10 Z" fill="white" opacity="0.6"/>
    
    <!-- Sparkle Effects -->
    <circle cx="0" cy="-10" r="15" fill="white" opacity="0.4" filter="url(#blur)"/>
    <path d="M-20 -20 L20 20 M-20 20 L20 -20" stroke="white" stroke-width="2" opacity="0.8"/>
  </g>
</svg>
