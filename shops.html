<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jewellers — Auramika</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Allura&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/variables.css" />
  <link rel="stylesheet" href="styles/pages/auramika-landing.css" />
  <link rel="stylesheet" href="styles/pages/auramika-mirror.css" />
  <link rel="stylesheet" href="styles/pages/auramika-pages.css" />
</head>
<body class="auramika-body" data-page="shops">
  <main class="au-page">
    <header class="au-page-head">
      <div class="au-page-head__crumbs"><a href="index.html">House</a><span>·</span>Jewellers</div>
      <div class="au-page-head__row">
        <div>
          <h1>Our <em>Atelier Partners</em></h1>
          <p>Master jewellers across India whose hands have carried this craft for generations. Every piece in the apothecary comes from one of these houses.</p>
        </div>
      </div>
    </header>

    <div class="au-filter">
      <button class="au-chip is-active">All Cities</button>
      <button class="au-chip">Mumbai</button>
      <button class="au-chip">Bengaluru</button>
      <button class="au-chip">Delhi</button>
      <button class="au-chip">Jaipur</button>
      <button class="au-chip">Hyderabad</button>
      <button class="au-chip">Kochi</button>
    </div>

    <div class="au-shop-grid" id="shopGrid"></div>
  </main>

  <script src="js/au-shell.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      const SHOPS = [
        ['Devkala Atelier','Mumbai · Est. 1948','assets/images/Pendant1.jpg', 4.9, '180 Pieces'],
        ['Ramanlal & Sons','Jaipur · Est. 1932','assets/images/Pendant1.2.jpg', 4.8, '142 Pieces'],
        ['Vimal Atelier','Bengaluru · Est. 1971','assets/images/Pendant1.3.jpg', 4.9, '96 Pieces'],
        ['Lakshmi Soneware','Hyderabad · Est. 1956','assets/images/Pendant1.4.jpg', 4.7, '124 Pieces'],
        ['Saraswati Goldsmiths','Delhi · Est. 1968','assets/images/Pendant1.5.jpg', 4.8, '88 Pieces'],
        ['Nair Jewellery House','Kochi · Est. 1924','assets/images/earring1.jpg', 5.0, '76 Pieces'],
        ['Mehta Mahal','Mumbai · Est. 1986','assets/images/Maang Tikka1.jpg', 4.6, '64 Pieces'],
        ['Raghav & Co.','Jaipur · Est. 1955','assets/images/Starry Elegance Gold Anklet1.jpg', 4.9, '108 Pieces'],
        ['Gupta Soneri','Delhi · Est. 1942','assets/images/Lakshmi Waist Belt1.jpg', 4.8, '92 Pieces'],
      ];

      const grid = document.getElementById('shopGrid');
      SHOPS.forEach(([name, city, img, rating, count], i) => {
        const card = document.createElement('a');
        card.href = `shop-detail.html?id=${i}&name=${encodeURIComponent(name)}&city=${encodeURIComponent(city)}&img=${encodeURIComponent(img)}`;
        card.className = 'au-shop';
        card.dataset.cursor = 'Visit';
        card.innerHTML = `
          <div class="au-shop__cover">
            <span class="au-shop__badge">Verified</span>
            <img src="${img}" alt="${name}" loading="lazy">
          </div>
          <div class="au-shop__body">
            <h3 class="au-shop__name">${name}</h3>
            <div class="au-shop__city">${city}</div>
            <div class="au-shop__line"><span class="stars">★★★★★</span><span>${rating} · ${count}</span></div>
          </div>`;
        grid.appendChild(card);
      });
    });
  </script>
</body>
</html>
