name: auramika
description: "AURAMIKA - Premium Gen Z Jewelry Marketplace"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Animation
  flutter_animate: ^4.5.2
  rive: ^0.13.20

  # Networking
  dio: ^5.8.0+1

  # Local Storage
  hive_flutter: ^1.1.0

  # Typography
  google_fonts: ^6.2.1

  # Performance / Images
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2

  # Deep links / external apps
  url_launcher: ^6.3.1

  # Location
  geolocator: ^13.0.2

  # Payment
  flutter_cashfree_pg_sdk: ^2.3.4+51

  # Utilities
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/products/
    - assets/images/categories/
    - assets/animations/
    - assets/icons/
